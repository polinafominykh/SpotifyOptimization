paths:
  raw_data: data/raw/spotify_tracks.csv
  artists_features: data/processed/artists_features.csv
  similarity_matrix: data/processed/similarity_matrix.csv

festival:
  n_artists: 200
  n_scenes: 3
  n_slots: 6
  budget: 700000

appeal_score:
  popularity_weight: 0.45
  energy_weight: 0.25
  danceability_weight: 0.20
